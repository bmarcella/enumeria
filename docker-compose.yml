version: "3.6"

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
volumes:
  ollama_data:

gitlab:
  image: gitlab/gitlab-ce:latest
  container_name: gitlab
  restart: always
  hostname: gitlab.example.com
  ports:
    - "80:80"
    - "443:443"
    - "22:22"
  volumes:
    - ./config:/etc/gitlab
    - ./logs:/var/log/gitlab
    - ./data:/var/opt/gitlab
redis:
  image: redis:7
  ports:
    - "6379:6379"
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 3s
    retries: 5
